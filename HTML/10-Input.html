<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input text</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Input Text</h1>
    <label for="nome">Nome: </label>
    <input
      type="text"
      id="nome"
      placeholder="Digite seu nome: "
      value="Gustavo"
      maxlength="10"
      minlength="3"
      required
      readonly
      disabled
      name="nome"
    />

    <input
      type="text"
      id="sobrenome"
      placeholder="Digite seu sobrenome"
      autofocus
    />

    <input
      type="text"
      id="apelido"
      placeholder="Digite seu apelido"
      pattern="[A-Za-z]+"
      title="Aqui você pode editar um apelido"
    />
  </body>
</html>
