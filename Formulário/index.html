<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário de Cadastro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Formulário de Cadastro</h1>
    <form action="/" method="post">
        <label for="nome">Nome Completo: </label>
        <input type="text" name "nome" id="nome" placeholder="Digite seu nome Completo">
        <br>
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email">
        <br>
        <label for="telefone">Telefone</label>
        <input type="tel" name="telefone" id="telefone">
        <br>
        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha">
        <br>
        <label for="idade">Idade</label>
        <input type="number" name="Idade" id="idade">
        <br>
        <label for="genero">Gênero</label>
        <select name="genero" id="genero">
            <option value="" selected disabled>Selecione...</option>
            <option value="feminino">Feminino</option>
            <option value="masculino">Masculino</option>
            <option value="outro">Outro</option>
        </select>
        <br>

        <h2>Interesses</h2>
        <input type="checkbox" name="Interesses" id="tecnologia" value="tecnologia">
        <label for="tecnologia">Tecnologias</label>
        <input type="checkbox" name="Interesses" id="esportes" value="esportes">
        <label for="esportes">Esportes</label>
        <input type="checkbox" name="Interesses" id="musica" value="musica">
        <label for="musica">Música</label>
        <br>
        <br>
        <label for="newsletter">Deseja recerber nossa newsletter</label>
        <input type="radio" name="newsletter" id="newsletter" value="sim">
        <label for="sim">Sim</label>
        <input type="radio" name="newsletter" id="newsletter" value="nao">
        <label for="nao">Não</label>
        <br>
        <h2>Informações adicionais</h2>
        <label for="sonho">Sonhos:</label>
        <textarea name="sonho" id="sonho" rows="5" cols="20" placeholder="Conte-nos seu maiores sonhos"></textarea>
        <br>
        <label for="cor">Cor favorita</label>
        <input type="color" name="cor" id="cor">
        <br>
        <label for="data">Data de Nascimento</label>
        <input type="date" name="data" id="data">
        <br>
        <label for="arquivo">Envie uma foto: </label>
        <input type="file" name="arquivo" id="arquivo">

        <br>
      <button type="submit">Enviar formulário</button>
    </form>
  </body>
</html>
